<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="Logo.png">
    <link rel="stylesheet" href="style.css">
    <title>Currency Converter</title>
</head>

<body>
    <nav>
        <div class="left">
            <a href="https://x.com/AkkalAbhishek" target="_blank"><img src="Logo.png" class="logo"></a>

            <div class="text">

                <div class="top">
                    <span class="name"><a href="https://www.linkedin.com/in/abhishek-akkal-0a0ab62b2/"
                            target="_blank">Abhishek</a></span>
                    <button class="follow"><a href="https://www.instagram.com/akkalabhishek_0028"
                            target="_blank">+Follow</a></button>
                </div>

                <span class="title">Currency Converter</span>
            </div>
        </div>
        <div class="right">
            <button class="heart">
                <i id="heartIcon" class="fa-regular fa-heart"></i>
                <span id="count">0</span>
            </button>
            <button class="code"><a href="https://github.com/abhishek-akkal/Neumorphic-Calculator/tree/main"
                    target="_blank">View SourceCode</a></button>
            <button class="sign-up">Sign Up</button>
            <button class="log-in">Log In</button>
        </div>
    </nav>

    <main>
        <div class="container">
            <h2>Currency Converter</h2>
            <form>
                <div class="amount">
                    <p>Enter amount</p>
                    <input value="1" type="text">
                </div>
                <div class="dropdown">
                    <div class="from">
                        <p>From</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/US/flat/64.png">
                            <select name="from">
                                <option value="USD">USD</option>
                                <option value="INR">INR</option>
                                <option value="EUR">EUR</option>
                                <option value="AUD">AUD</option>
                            </select>
                        </div>
                    </div>
                    <i class="fa-solid fa-right-left"></i>
                    <div class="to">
                        <p>To</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/IN/flat/64.png">
                            <select name="to">
                                <option value="USD">USD</option>
                                <option value="INR" selected>INR</option>
                                <option value="EUR">EUR</option>
                                <option value="AUD">AUD</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="msg">1 USD = 95.067 INR</div>
                <button>Get Exchange Rate</button>
            </form>
        </div>
    </main>
    <script src="codes.js"></script>
    <script src="app.js"></script>
</body>

</html>
